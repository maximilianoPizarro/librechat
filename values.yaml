global:
  librechat:
    existingSecretApiKey: OPENAI_API_KEY
    existingSecretName: librechat-librechat-secretenv
image:
  pullPolicy: IfNotPresent
  registry: quay.io
  repository: maximilianopizarro/librechat
  tag: 'v0.8.4'
imagePullSecrets: []

enableServiceLinks: true

route:
  enabled: true  
  host: ''
  sccRoleDisabled: false

ingress:
  annotations: {}
  className: ''
  enabled: false
  hosts:
    - host: librechat.openshiftapps.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
librechat:
  configEnv:
    SEARCH: 'true'
    MEILI_NO_ANALYTICS: 'true'
    MEILI_MASTER_KEY: librechat
    OPENAI_API_KEY: IiI=
    NODE_TLS_REJECT_UNAUTHORIZED: '0'
    CREDS_IV: 118a16ffe26a8712d0adb5b3cf8229ca
    CREDS_KEY: 99f12ba0ea72257aa78df8e99c9be801716a7e16fe77e7510a914112528aa05c
    DEBUG_PLUGINS: 'true'
    JWT_REFRESH_SECRET: 8a447c316c171f5df8e304c085187b6d10e4eeef5174137d4ad4d2cdd956f5e7
    JWT_SECRET: 83096493d70e22561f84191c24f459d72e9b41f4c8657fe43aae8cb9b0fe1fa4
    ALLOW_EMAIL_LOGIN: 'true'
    ALLOW_REGISTRATION: 'true'
    ALLOW_SOCIAL_LOGIN: 'true'
    DOMAIN_SERVER: 'http://0.0.0.0:3080'
    OPENID_CALLBACK_URL: /oauth/openid/callback
    OPENID_LOGIN_ENABLED: 'true'
    OPENID_SESSION_SECRET: sessionsecret
    OPENID_ISSUER: 'https://auth.redhat.com/realms/librechat'
    OPENID_USE_END_SESSION_ENDPOINT: 'true'
    OPENID_CLIENT_ID: client-id
    OPENID_CLIENT_SECRET: client-secret
    SOCIAL_LOGIN_ENABLED: 'true'
    OPENID_SCOPE: openid profile email
    OPENID_REQUIRED_ROLE_TOKEN_KIND: access
    OPENID_REQUIRED_ROLE_PARAMETER_PATH: realm_access.roles    
    PLUGIN_MODELS: >-
      gpt-4,gpt-4-turbo-preview,gpt-4-0125-preview,gpt-4-1106-preview,gpt-4-0613,gpt-3.5-turbo,gpt-3.5-turbo-0125,gpt-3.5-turbo-1106,gpt-3.5-turbo-0613,llama-3-1-8b-instruct
  configYamlContent: |
    version: 1.2.1
    cache: true
    fileConfig:
      endpoints:
        assistants:
          fileLimit: 5
          fileSizeLimit: 10
          totalSizeLimit: 50
          supportedMimeTypes:
            - "image/.*"
            - "application/pdf"
            - "application/vnd.oasis.opendocument.text"
        openAI:
          disabled: true
        default:
          totalSizeLimit: 20
      serverFileSizeLimit: 100
      avatarSizeLimit: 2
    rateLimits:
      fileUploads:
        ipMax: 100
        ipWindowInMinutes: 60
        userMax: 50
        userWindowInMinutes: 60
    #registration:
    #  socialLogins: ["google", "facebook", "github", "discord", "openid"]
    #  allowedDomains:
    #    - "email"
    #    - ".apps.rm2.thpm.p1.openshiftapps.com"
    endpoints:
      custom:
        # Example: OpenAI-compatible endpoint (LiteLLM, vLLM, Ollama, etc.)
        - name: "OpenAI"
          apiKey: "${OPENAI_API_KEY}"
          baseURL: "https://api.openai.com/v1"
          models:
            default: ["gpt-4o", "gpt-4-turbo", "gpt-3.5-turbo"]
            fetch: true
          titleConvo: true
          titleModel: "gpt-4o"
          summarize: false
          summaryModel: "gpt-3.5-turbo"
        # Uncomment to add Ollama (requires ollama.enabled: true)
        # - name: "Ollama"
        #   apiKey: "${OPENAI_API_KEY}"
        #   baseURL: "http://librechat-ollama:11434/v1"
        #   models:
        #     default: ["llama3.2"]
        #     fetch: true
        #   titleConvo: true
        #   titleModel: "llama3.2"
        #   summarize: false
        #   summaryModel: "llama3.2"
  
  existingConfigYaml: ''
  existingSecretName: librechat-librechat-secretenv
  serviceAccountName: librechat-sa
  imageVolume:
    accessModes: ReadWriteOnce
    enabled: true
    size: 10G
librechat-rag-api:
  embeddingsProvider: openai
  enabled: true
lifecycle: {}
meilisearch:
  auth:
    existingMasterKeySecret: librechat-librechat-secretenv
  enabled: true
  image:
    tag: v1.7.3
  persistence:
    enabled: true
    storageClass: ''
  serviceAccountName: librechat-meilisearch-sa
postgresql:
  auth:
    database: librechat-vectordb
    username: postgres
    password: postgres 
  enabled: true
  image:
    registry: ghcr.io
    repository: bat-bs/bitnami-pgvector
    tag: pg16

  primary:
    initdb:
      scripts:
        create-librechat-db.sql: |
          -- Ensure the database exists
          CREATE DATABASE "librechat-vectordb" WITH OWNER postgres;

          -- Connect to the new database and create the pgvector extension
          \c librechat-vectordb
          CREATE EXTENSION IF NOT EXISTS vector;
          
          -- CREATE USER postgres WITH PASSWORD 'postgres';
          -- GRANT ALL PRIVILEGES ON DATABASE "librechat-vectordb" TO postgres;
mongodb:
  image:
    pullPolicy: IfNotPresent
    registry: docker.io
    repository: mongo
    tag: '8.0.13'
  auth:
    enabled: false
  databases:
    - LibreChat
  enabled: true
  extraVolumeMounts:
    - name: datadir
      mountPath: /data/db
# Ollama is disabled by default. Enable it and add the Ollama endpoint
# to librechat.configYamlContent.endpoints.custom to use local models.
# Example:
#   ollama:
#     enabled: true
# Then add to configYamlContent endpoints.custom:
#   - name: "Ollama"
#     apiKey: "${OPENAI_API_KEY}"
#     baseURL: "http://librechat-ollama:11434/v1"
#     models:
#       default: ["llama3.2"]
#       fetch: true
#     titleConvo: true
#     titleModel: "llama3.2"
ollama:
  enabled: false

# LiteLLM proxy for OpenAI-compatible access to vLLM/KServe models.
# Disabled by default. Enable in sandbox or when proxying to inference services.
# For OpenShift Developer Sandbox, set litellm.apiKey to $(oc whoami -t)
# at install/upgrade time since OAuth tokens expire (~24h).
# Example:
#   helm upgrade librechat . -f values-sandbox.yaml \
#     --set litellm.apiKey=$(oc whoami -t)
litellm:
  enabled: false
  image:
    repository: litellm/litellm-non_root
    tag: v1.82.3-stable
    pullPolicy: IfNotPresent
  service:
    port: 4000
  masterKey: "sk-litellm-1234"
  apiKey: "dummy"
  useServiceAccountToken: false
  models: []
  # Example models configuration:
  # models:
  #   - name: granite-3.1-8b
  #     modelId: isvc-granite-31-8b-fp8
  #     apiBase: "https://model-predictor.namespace.svc.cluster.local:8443/v1"
  #   - name: qwen3-8b
  #     modelId: isvc-qwen3-8b-fp8
  #     apiBase: "https://model-predictor.namespace.svc.cluster.local:8443/v1"
  podSecurityContext: {}
  securityContext: {}
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 60
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 5
readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 5
nameOverride: ''
nodeSelector: {}
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
replicaCount: 1
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "2Gi"
securityContext: {}
service:
  annotations: {}
  port: 3080
  type: ClusterIP
tolerations: []
updateStrategy:
  type: RollingUpdate
volumeMounts:
  - name: librechat-data-volume
    mountPath: /app/data
  - name: librechat-uploads-volume
    mountPath: /app/uploads
  - name: librechat-logs-volume
    mountPath: /app/logs
  - name: librechat-api-logs-volume
    mountPath: /app/api/logs
volumes:
  - name: librechat-uploads-volume
    emptyDir: {} 
  - name: librechat-data-volume
    emptyDir: {} 
  - name: librechat-logs-volume
    emptyDir: {}
  - name: librechat-api-logs-volume
    emptyDir: {}