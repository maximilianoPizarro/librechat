apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "librechat.fullname" . }}-test-connection"
  labels:
    {{- include "librechat.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  securityContext:
    runAsNonRoot: true
    {{- if not (empty .Values.podSecurityContext) }}
    {{- toYaml .Values.podSecurityContext | nindent 4 }}
    {{- end }}
  containers:
    - name: wget
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      command: ['curl']
      args: ['-sSf', 'http://{{ include "librechat.fullname" . }}:{{ .Values.service.port }}/']
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
  restartPolicy: Never
